name: CI

on:
  push:
  pull_request:

jobs:
  server:
    name: Server – typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Sem postinstall no server/ → `npm ci` NÃO gera o client. tsc contra um client stale
      # produz os 35 erros de accounting/repositories/ReconciliationRepository.ts (schema TEM
      # os modelos; faltava só o generate reproduzível). Este passo fecha o gap P2.
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (layer-gate)
        run: npm run lint

      - name: Run tests
        run: npm test

  frontend:
    name: Frontend – build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (layer-gate)
        run: npm run lint:gate

      - name: Build
        run: npm run build

  # Gate de governança de skills. `skill-audit run --all` é determinístico (estático: validate +
  # governance-check + sync-metadata + coverage + eval-estrutural + controls + self-check) — sem
  # model-in-loop, roda em < 1s. Barra drift: regra sem gate, gate órfão, eval-score divergente do
  # REPORT, controle que deixou de discriminar, ou self-check do auditor quebrado. A varredura
  # COMPORTAMENTAL (re-geração via subagente / `/skill-audit --sweep`) continua human-run, fora do CI.
  # Precisa do `typescript` de server/ para as assertions AST (ast-jsx/ast-import/ast-noclass).
  skill-governance:
    name: Skill governance – skill-audit run --all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps (typescript for AST assertions)
        working-directory: server
        run: npm ci

      - name: skill-audit run --all (0 findings required)
        run: node .claude/skills/skill-audit/skill-audit.mjs run

  # Gate de PRESENÇA da camada de governança operacional (OPS-001..004). O `skill-audit` acima
  # cobre drift interno das skills, mas NÃO garante que os artefatos-âncora existam — docs/skills
  # podem regredir silenciosamente (gap P1 do teste de sistema 2026-07-07). Este job falha se:
  #   • .claude/skills/_OPERATING-GATES.md sumir, OU
  #   • a referência "Gates de envio OPS-001" sair do reviewer OU do implementer.
  # NOTA: bloqueante desde já (decisão do usuário). Fica VERMELHO até PR #44 (camada OPS-001)
  # ser mergeada em main — os três alvos ainda não estão em main na criação deste workflow.
  governance-presence:
    name: Governance – OPS-001 layer present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert operating-gates layer exists
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          [ -f .claude/skills/_OPERATING-GATES.md ] || { echo "::error::.claude/skills/_OPERATING-GATES.md ausente (camada OPS-001)."; fail=1; }
          grep -q "Gates de envio OPS-001" .claude/skills/luminaris-reviewer/SKILL.md    || { echo "::error::reviewer SKILL.md sem 'Gates de envio OPS-001'."; fail=1; }
          grep -q "Gates de envio OPS-001" .claude/skills/luminaris-implementer/SKILL.md || { echo "::error::implementer SKILL.md sem 'Gates de envio OPS-001'."; fail=1; }
          [ "$fail" = 0 ] && echo "OK: camada de governança OPS-001 presente."
          exit "$fail"

  # Diff-scoped design gate. A base ainda tem ~33 ocorrências de `zinc-` pré-existentes
  # (contrato §4: superfícies dark = neutral-*). Em vez de reprovar nelas (refactor =
  # fatia própria), este job falha SÓ quando a mudança INTRODUZ um `zinc-` novo — mesmo
  # princípio do layer-gate: barra regressão, não força o pagamento da dívida existente.
  # Backlog mensurável: `grep -rn "zinc-" my-app/{features,lib,components,pages,styles}`.
  zinc-guard:
    name: Design – no new zinc-
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail on newly-added zinc- (use neutral-* per contract §4)
        shell: bash
        run: |
          set -uo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "${GITHUB_BASE_REF}"
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BASE="${GITHUB_SHA}~1"
          fi
          ADDED=$(git diff --unified=0 "${BASE}...${GITHUB_SHA}" -- \
                    'my-app/**/*.ts' 'my-app/**/*.tsx' 'my-app/**/*.css' 'my-app/**/*.scss' \
                  | grep -E '^\+' | grep -v '^\+\+\+' | grep 'zinc-' || true)
          if [ -n "${ADDED}" ]; then
            echo "::error::New 'zinc-' introduced — dark surfaces must use neutral-* (contract §4)."
            echo "${ADDED}"
            exit 1
          fi
          echo "OK: no new zinc- added."
